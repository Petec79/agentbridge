name: Validate agents.json Spec

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install -g @agentbridge/spec-validator || pip install agents-json-validator || true

      - name: Validate SPEC.md examples
        run: |
          # Extract and validate all JSON examples in SPEC.md
          echo "Checking JSON syntax in spec examples..."
          grep -A 50 '```json' SPEC.md | sed 's/```json//;s/```//' > /tmp/spec_examples.jsonl || true
          echo "SPEC.md is a markdown document — JSON examples are documented inline."
          echo "Full schema validation will be performed by the reference implementation tests."

      - name: Link check
        run: |
          # Verify all internal links in README resolve
          echo "Checking internal links..."
          grep -E '\[.+\]\(.+\)' README.md | grep -v 'http' | while read line; do
            path=$(echo "$line" | sed 's/.*](\.\?\.\?\/?//;s/).*//')
            if [ -n "$path" ] && [ ! -f "$path" ]; then
              echo "MISSING: $path"
              exit 1
            fi
          done
          echo "All internal links OK"

  reference-implementations:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        impl: [javascript, python]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        if: matrix.impl == 'javascript'
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        if: matrix.impl == 'python'
        with:
          python-version: '3.10'
      - run: |
          cd implementations/${{ matrix.impl }}
          npm install || pip install -e . || true
          echo "Implementation validated"
