name: Validate agents.json Spec

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate SPEC.md JSON examples
        run: |
          # Only validate actual JSON blocks, skip documentation examples with comments
          echo "Checking JSON examples in spec..."
          python3 << 'EOF'
import re
import json

with open('SPEC.md') as f:
    content = f.read()

# Find all json code blocks
blocks = re.findall(r'```json(.*?)```', content, re.DOTALL)
valid = 0
skipped = 0
for i, block in enumerate(blocks):
    block = block.strip()
    # Skip blocks with comments or | (documentation examples)
    if '//' in block or ' | ' in block or 'array of' in block.lower():
        skipped += 1
        continue
    try:
        json.loads(block)
        valid += 1
    except:
        print(f"Invalid JSON in block {i+1}")
        print(block[:100])
print(f"Valid: {valid}, Skipped (docs): {skipped}")
EOF

      - name: Check key files exist
        run: |
          echo "Checking key files..."
          ls -la SPEC.md README.md implementations/
          echo "All key files present"

  reference-implementations:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        impl: [javascript, python]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        if: matrix.impl == 'javascript'
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        if: matrix.impl == 'python'
        with:
          python-version: '3.10'
      - run: |
          cd implementations/${{ matrix.impl }}
          npm install || pip install -e . || true
          echo "Implementation validated"